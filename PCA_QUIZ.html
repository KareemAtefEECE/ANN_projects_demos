<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PCA Quiz · ANN Course Project</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ═══════════ TOKENS ═══════════ */
:root{
  --bg:        #070C14;
  --surface:   #0D1521;
  --surface2:  #111D2E;
  --border:    #1C2D42;
  --teal:      #00E5CC;
  --teal-dim:  rgba(0,229,204,.12);
  --orange:    #FF6B35;
  --orange-dim:rgba(255,107,53,.12);
  --blue:      #00A8FF;
  --red:       #FF4F6A;
  --red-dim:   rgba(255,79,106,.12);
  --green:     #3DFF9A;
  --green-dim: rgba(61,255,154,.12);
  --text:      #D0E4F0;
  --muted:     #4E6578;
  --mono:      'Space Mono', monospace;
  --sans:      'DM Sans', sans-serif;
}

/* ═══════════ RESET ═══════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--sans);
  min-height:100vh;
  line-height:1.6;
  overflow-x:hidden;
}

/* ═══════════ NOISE TEXTURE ═══════════ */
body::before{
  content:'';
  position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  background-size:200px;
  pointer-events:none;
  z-index:0;
}

/* ═══════════ LAYOUT ═══════════ */
#app{
  position:relative;z-index:1;
  max-width:820px;
  margin:0 auto;
  padding:40px 24px 80px;
}

/* ═══════════ HEADER ═══════════ */
header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:48px;
  padding-bottom:20px;
  border-bottom:1px solid var(--border);
}
.logo{
  font-family:var(--mono);
  font-size:11px;
  color:var(--muted);
  letter-spacing:2px;
  text-transform:uppercase;
}
.logo span{color:var(--teal)}
#progress-text{
  font-family:var(--mono);
  font-size:11px;
  color:var(--muted);
  letter-spacing:1px;
}

/* progress bar */
#prog-wrap{
  height:2px;
  background:var(--border);
  border-radius:2px;
  margin-bottom:48px;
  overflow:hidden;
}
#prog-bar{
  height:100%;
  background:linear-gradient(90deg,var(--teal),var(--blue));
  border-radius:2px;
  transition:width .5s cubic-bezier(.4,0,.2,1);
  width:0%;
}

/* ═══════════ QUESTION CARD ═══════════ */
#quiz-screen{animation:fadeUp .4s ease both}

.q-meta{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:20px;
}
.q-num{
  font-family:var(--mono);
  font-size:10px;
  letter-spacing:2px;
  color:var(--teal);
  background:var(--teal-dim);
  padding:4px 10px;
  border-radius:4px;
}
.q-category{
  font-family:var(--mono);
  font-size:10px;
  letter-spacing:1px;
  color:var(--muted);
  text-transform:uppercase;
}

.q-text{
  font-size:17px;
  font-weight:500;
  line-height:1.65;
  color:var(--text);
  margin-bottom:32px;
}

/* options */
.options{display:flex;flex-direction:column;gap:12px}
.opt{
  display:flex;
  align-items:flex-start;
  gap:16px;
  padding:16px 20px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  cursor:pointer;
  transition:all .18s ease;
  text-align:left;
  width:100%;
  color:var(--text);
  font-family:var(--sans);
  font-size:15px;
  line-height:1.55;
  position:relative;
  overflow:hidden;
}
.opt::before{
  content:'';
  position:absolute;inset:0;
  opacity:0;
  transition:opacity .2s;
}
.opt:hover:not(:disabled)::before{opacity:1;background:rgba(0,229,204,.04)}
.opt:hover:not(:disabled){border-color:rgba(0,229,204,.3);transform:translateX(3px)}

.opt-letter{
  font-family:var(--mono);
  font-size:11px;
  font-weight:700;
  color:var(--muted);
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:5px;
  width:28px;height:28px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  transition:all .18s;
}
.opt:hover:not(:disabled) .opt-letter{
  color:var(--teal);
  border-color:var(--teal);
  background:var(--teal-dim);
}

/* answered states */
.opt.correct{
  border-color:var(--green);
  background:var(--green-dim);
  animation:pulseGreen .4s ease;
}
.opt.correct .opt-letter{
  color:var(--green);
  border-color:var(--green);
  background:rgba(61,255,154,.15);
}
.opt.wrong{
  border-color:var(--red);
  background:var(--red-dim);
  animation:shake .35s ease;
}
.opt.wrong .opt-letter{
  color:var(--red);
  border-color:var(--red);
  background:var(--red-dim);
}
.opt.dimmed{opacity:.38}
.opt:disabled{cursor:default;transform:none}

/* next button */
#next-btn{
  display:none;
  margin-top:28px;
  padding:13px 36px;
  background:transparent;
  border:1px solid var(--teal);
  border-radius:8px;
  color:var(--teal);
  font-family:var(--mono);
  font-size:12px;
  letter-spacing:1.5px;
  cursor:pointer;
  transition:all .2s;
  text-transform:uppercase;
}
#next-btn:hover{background:var(--teal-dim);box-shadow:0 0 20px rgba(0,229,204,.15)}

/* ═══════════ RESULT SCREEN ═══════════ */
#result-screen{display:none;animation:fadeUp .5s ease both}

.score-hero{
  text-align:center;
  padding:60px 0 48px;
}
.score-ring{
  width:130px;height:130px;
  border-radius:50%;
  border:3px solid var(--border);
  display:inline-flex;
  flex-direction:column;
  align-items:center;justify-content:center;
  margin-bottom:28px;
  position:relative;
}
.score-ring svg{
  position:absolute;top:-3px;left:-3px;
  transform:rotate(-90deg);
}
.score-ring circle{transition:stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1)}
.score-num{font-family:var(--mono);font-size:36px;font-weight:700;color:var(--teal);line-height:1}
.score-denom{font-family:var(--mono);font-size:13px;color:var(--muted)}
.score-label{
  font-size:24px;font-weight:600;color:var(--text);margin-bottom:8px
}
.score-sub{font-size:14px;color:var(--muted)}

/* grade badges */
.grade-bar{
  display:flex;gap:8px;justify-content:center;
  margin:28px 0 48px;
  flex-wrap:wrap;
}
.grade-pill{
  font-family:var(--mono);font-size:10px;letter-spacing:1.5px;
  padding:6px 14px;border-radius:20px;
  border:1px solid var(--border);
  color:var(--muted);
}
.grade-pill.active{
  border-color:var(--teal);
  color:var(--teal);
  background:var(--teal-dim);
}

/* review section */
.review-header{
  display:flex;align-items:center;gap:16px;
  margin-bottom:32px;
}
.review-header h2{
  font-family:var(--mono);font-size:13px;letter-spacing:2px;
  text-transform:uppercase;color:var(--text);
}
.divider{flex:1;height:1px;background:var(--border)}

.review-item{
  margin-bottom:20px;
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
}
.review-item.ri-correct{border-color:rgba(61,255,154,.25)}
.review-item.ri-wrong{border-color:rgba(255,79,106,.25)}

.ri-top{
  display:flex;align-items:flex-start;gap:14px;
  padding:18px 20px;
  background:var(--surface);
  cursor:pointer;
  user-select:none;
}
.ri-icon{
  width:26px;height:26px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;flex-shrink:0;margin-top:1px;
}
.ri-correct .ri-icon{background:var(--green-dim);color:var(--green)}
.ri-wrong .ri-icon{background:var(--red-dim);color:var(--red)}

.ri-qtext{font-size:14px;line-height:1.6;flex:1}
.ri-chevron{
  color:var(--muted);font-size:12px;
  transition:transform .25s;flex-shrink:0;margin-top:3px;
}
.review-item.open .ri-chevron{transform:rotate(180deg)}

.ri-body{
  display:none;
  padding:20px;
  background:var(--surface2);
  border-top:1px solid var(--border);
}
.review-item.open .ri-body{display:block}

.ri-choices{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.ri-choice{
  display:flex;align-items:flex-start;gap:10px;
  padding:10px 14px;
  border-radius:7px;
  border:1px solid transparent;
  font-size:13.5px;line-height:1.5;
}
.ri-choice.rc-correct{
  border-color:rgba(61,255,154,.3);
  background:var(--green-dim);
  color:var(--green);
}
.ri-choice.rc-wrong-pick{
  border-color:rgba(255,79,106,.3);
  background:var(--red-dim);
  color:var(--red);
}
.ri-choice.rc-neutral{color:var(--muted)}
.ri-choice-ltr{
  font-family:var(--mono);font-size:10px;font-weight:700;
  width:22px;height:22px;border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  border:1px solid currentColor;
  opacity:.7;
}

.ri-explain{
  margin-top:12px;
  padding:14px 16px;
  border-left:3px solid var(--teal);
  background:var(--teal-dim);
  border-radius:0 6px 6px 0;
  font-size:13px;
  line-height:1.65;
  color:var(--text);
}
.ri-explain-label{
  font-family:var(--mono);font-size:9px;letter-spacing:1.5px;
  color:var(--teal);text-transform:uppercase;margin-bottom:6px;
}

/* retry button */
#retry-btn{
  display:block;margin:40px auto 0;
  padding:14px 48px;
  background:transparent;
  border:1px solid var(--orange);
  border-radius:8px;
  color:var(--orange);
  font-family:var(--mono);font-size:12px;letter-spacing:1.5px;
  cursor:pointer;text-transform:uppercase;
  transition:all .2s;
}
#retry-btn:hover{background:var(--orange-dim);box-shadow:0 0 20px rgba(255,107,53,.15)}

/* ═══════════ ANIMATIONS ═══════════ */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(18px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes pulseGreen{
  0%{box-shadow:0 0 0 0 rgba(61,255,154,.4)}
  70%{box-shadow:0 0 0 10px rgba(61,255,154,0)}
  100%{box-shadow:none}
}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-6px)}
  75%{transform:translateX(6px)}
}
@keyframes slideIn{
  from{opacity:0;transform:translateX(-10px)}
  to{opacity:1;transform:translateX(0)}
}

/* ═══════════ RESPONSIVE ═══════════ */
@media(max-width:600px){
  #app{padding:28px 16px 60px}
  .q-text{font-size:15px}
  .opt{font-size:14px;padding:13px 16px}
  header{flex-direction:column;align-items:flex-start;gap:8px}
}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo"><span>PCA</span> · ANN Course Project</div>
    <div id="progress-text">Q<span id="q-cur">1</span> / 20</div>
  </header>

  <div id="prog-wrap"><div id="prog-bar"></div></div>

  <!-- ── QUIZ SCREEN ── -->
  <div id="quiz-screen">
    <div class="q-meta">
      <div class="q-num" id="q-badge">Q01</div>
      <div class="q-category" id="q-cat">—</div>
    </div>
    <div class="q-text" id="q-text"></div>
    <div class="options" id="options"></div>
    <button id="next-btn" onclick="nextQuestion()">Next Question →</button>
  </div>

  <!-- ── RESULT SCREEN ── -->
  <div id="result-screen">
    <div class="score-hero">
      <div class="score-ring">
        <svg width="136" height="136" viewBox="0 0 136 136">
          <circle cx="68" cy="68" r="62" fill="none" stroke="#1C2D42" stroke-width="3"/>
          <circle id="score-arc" cx="68" cy="68" r="62" fill="none"
                  stroke="url(#arcGrad)" stroke-width="3"
                  stroke-linecap="round"
                  stroke-dasharray="389.6"
                  stroke-dashoffset="389.6"/>
          <defs>
            <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#00E5CC"/>
              <stop offset="100%" stop-color="#00A8FF"/>
            </linearGradient>
          </defs>
        </svg>
        <div class="score-num" id="s-num">0</div>
        <div class="score-denom">/ 20</div>
      </div>
      <div class="score-label" id="s-label">—</div>
      <div class="score-sub" id="s-sub"></div>
    </div>

    <div class="grade-bar" id="grade-bar">
      <div class="grade-pill" data-min="0"  data-max="9"  >0 – 9 · Needs Review</div>
      <div class="grade-pill" data-min="10" data-max="13" >10 – 13 · Passing</div>
      <div class="grade-pill" data-min="14" data-max="16" >14 – 16 · Good</div>
      <div class="grade-pill" data-min="17" data-max="18" >17 – 18 · Great</div>
      <div class="grade-pill" data-min="19" data-max="20" >19 – 20 · Perfect</div>
    </div>

    <div class="review-header">
      <h2>Answer Review</h2>
      <div class="divider"></div>
    </div>
    <div id="review-list"></div>

    <button id="retry-btn" onclick="startQuiz()">↩ Retake Quiz</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
//  DATA
// ═══════════════════════════════════════════════════════════════════
const QUESTIONS = [
  {
    q: "Which of the following best describes what Principal Component Analysis (PCA) fundamentally does to the data's coordinate system?",
    opts: [
      "It increases the dimensions of the coordinate system to separate non-linear data.",
      "It rotates the coordinate system to align with the directions of maximum variance in the data.",
      "It shifts the coordinate system's origin to match the lowest data point.",
      "It maps the continuous coordinate system into a discrete, categorical space."
    ],
    correct: 1,
    explain: "PCA rotates the original coordinate axes into new orthogonal axes (principal components) that align with the directions of maximum variance in the dataset.",
    cat: "Fundamentals"
  },
  {
    q: "What is the primary goal of PCA?",
    opts: [
      "Classification of labeled data",
      "Improving model accuracy in supervised learning",
      "Reducing the number of features while preserving variance",
      "Detecting outliers in a dataset"
    ],
    correct: 2,
    explain: "PCA reduces dimensionality while preserving as much variance (information) as possible.",
    cat: "Fundamentals"
  },
  {
    q: "Which mathematical objects does PCA compute to find the principal components?",
    opts: [
      "Eigenvectors and eigenvalues",
      "Gradient and Hessian",
      "Mean and median of each feature",
      "Partial derivatives and integrals"
    ],
    correct: 0,
    explain: "PCA computes eigenvectors and eigenvalues of the covariance matrix. Eigenvectors define component directions, while eigenvalues represent the variance captured.",
    cat: "Math"
  },
  {
    q: "Before applying PCA, data should typically be pre-processed by:",
    opts: [
      "Randomly shuffling all samples",
      "Converting continuous features to categorical",
      "Removing all correlated features manually",
      "Mean-centering (and ideally standardizing) each feature"
    ],
    correct: 3,
    explain: "Mean-centering and standardization prevent features with larger scales from dominating the covariance matrix.",
    cat: "Pre-processing"
  },
  {
    q: "The first principal component (PC1) is defined as the direction that:",
    opts: [
      "Has the smallest variance in the projected data",
      "Captures the maximum variance in the data",
      "Is parallel to the feature with the highest mean",
      "Minimizes the number of non-zero loadings"
    ],
    correct: 1,
    explain: "PC1 is the direction that captures the maximum variance in the dataset.",
    cat: "Fundamentals"
  },
  {
    q: "If a dataset has 10 original features, the maximum number of principal components that can be extracted is:",
    opts: [
      "5",
      "20",
      "10",
      "It depends only on the number of samples"
    ],
    correct: 2,
    explain: "The number of principal components cannot exceed the number of original features.",
    cat: "Fundamentals"
  },
  {
    q: "In PCA, the principal components are always:",
    opts: [
      "Orthogonal (perpendicular) to each other",
      "Parallel to each other",
      "Randomly oriented relative to the data",
      "Aligned with the original feature axes"
    ],
    correct: 0,
    explain: "Principal components are orthogonal, ensuring that they are uncorrelated.",
    cat: "Math"
  },
  {
    q: "Which matrix does PCA decompose to obtain its principal components (in the classical approach)?",
    opts: [
      "The identity matrix",
      "The Jacobian matrix of the data",
      "The Hessian matrix of the loss function",
      "The covariance matrix of the data"
    ],
    correct: 3,
    explain: "PCA performs eigen-decomposition on the covariance matrix of the mean-centered data.",
    cat: "Math"
  },
  {
    q: "In PCA, eigenvalues represent:",
    opts: [
      "The amount of variance captured by each principal component",
      "The number of features in the original dataset",
      "The mean of each feature",
      "The error rate of the model"
    ],
    correct: 0,
    explain: "Each eigenvalue measures how much variance, or information, is captured along its corresponding eigenvector / principal component.",
    cat: "Math"
  },
  {
    q: "The proportion of variance explained by a principal component is calculated as:",
    opts: [
      "Its eigenvalue divided by the sum of all eigenvalues",
      "The L2 norm of its eigenvector",
      "The trace of the full covariance matrix",
      "Its eigenvalue divided by the total number of features"
    ],
    correct: 0,
    explain: "The explained variance ratio is computed as λᵢ / Σλ.",
    cat: "Math"
  },
  {
    q: "Assuming the data follows a multidimensional Gaussian distribution, it can be fully defined using which two parameters?",
    opts: [
      "The Median and the Range",
      "The Mean Vector (μ) and the Covariance Matrix (Σ)",
      "The Eigenvalues (Λ) and the Identity Matrix (I)",
      "The Correlation Coefficient (r) and the Standard Deviation (σ)"
    ],
    correct: 1,
    explain: "A multivariate Gaussian distribution is fully characterized by its mean vector and covariance matrix.",
    cat: "Theory"
  },
  {
    q: "When using PCA purely for data visualization purposes, dimensions are typically reduced to:",
    opts: [
      "Half the original number of features",
      "The number of features with eigenvalues greater than 1 (Kaiser rule)",
      "At least 10 components for accuracy",
      "2 or 3 components so the data can be plotted"
    ],
    correct: 3,
    explain: "PCA visualization commonly uses 2D or 3D projections.",
    cat: "Applications"
  },
  {
    q: "Consider a covariance matrix with eigenvalues [5, 3, 1, 1]. What percentage of total variance is explained by the first two principal components?",
    opts: [
      "50%",
      "60%",
      "70%",
      "80%"
    ],
    correct: 3,
    explain: "The first two components explain (5 + 3) / (5 + 3 + 1 + 1) = 8/10 = 80% of the variance.",
    cat: "Calculation"
  },
  {
    q: "PCA is described as an unsupervised method because:",
    opts: [
      "It always ignores the covariance between features",
      "It uses class labels to guide the projection",
      "It cannot be applied to labeled datasets",
      "It finds components based on data variance alone, without using class labels"
    ],
    correct: 3,
    explain: "PCA only relies on variance and covariance structure, not class labels.",
    cat: "Theory"
  },
  {
    q: "A dataset contains annual salary ($30k–$90k) and age (20–60 yrs). Without standardization, PC1 is almost entirely driven by salary. What best explains this?",
    opts: [
      "Salary is inherently more important than age, so PCA correctly weighted it higher.",
      "PCA maximizes variance, and salary's large numerical range produces far greater raw variance than age, dominating the covariance matrix regardless of actual informational value.",
      "Standardization removes the correlation between salary and age, forcing PCA to treat them equally.",
      "PCA cannot compute a valid covariance matrix when features have different units."
    ],
    correct: 1,
    explain: "Variance grows with the square of the range — salary spans ~60,000 units vs age's ~40 units, making salary's raw variance roughly 2,250,000× larger. This dominates the covariance matrix due to measurement units, not meaningful structure. Note: standardization does not remove correlations — it only rescales features.",
    cat: "Pre-processing"
  },
  {
    q: "After transforming data into the PC space, the off-diagonal elements of the new covariance matrix Σᵧ are exactly zero. What does this physically mean?",
    opts: [
      "The features are perfectly correlated.",
      "The new features are completely uncorrelated.",
      "The data has been heavily compressed.",
      "The algorithm failed to find a dominant axis."
    ],
    correct: 1,
    explain: "Zero off-diagonal covariance terms mean the transformed features are uncorrelated.",
    cat: "Theory"
  },
  {
    q: "If some features in the dataset are perfectly correlated (dependent), what are the correct mathematical properties of the covariance matrix?",
    opts: [
      "Asymmetric and Negative Definite",
      "Symmetric and Positive Semi-Definite",
      "Symmetric and strictly Positive Definite",
      "Diagonal and Singular"
    ],
    correct: 1,
    explain: "Covariance matrices are always symmetric. Perfectly dependent features make the matrix positive semi-definite rather than strictly positive definite.",
    cat: "Math"
  },
  {
    q: "During eigen-decomposition (Σ = ΦΛΦᵀ), what do the columns of the Modal Matrix Φ represent?",
    opts: [
      "The final projected coordinates of the data points in the new space.",
      "The direction of the new principal axes (eigenvectors).",
      "The mean-centered feature vectors of the original dataset.",
      "The residual noise discarded during dimension reduction."
    ],
    correct: 1,
    explain: "The columns of Φ are eigenvectors that define the directions of the new principal axes.",
    cat: "Math"
  },
  {
    q: "In a 4D dataset where the 4th feature is an exact duplicate of the 1st feature (x₄ = x₁), what will be the eigenvalue of the 4th principal component?",
    opts: [
      "It will equal the eigenvalue of PC1.",
      "It will be infinity.",
      "It will be exactly zero.",
      "It will be negative."
    ],
    correct: 2,
    explain: "Perfectly duplicated features introduce no additional variance, producing a zero eigenvalue.",
    cat: "Theory"
  },
  {
    q: "If the total variance is 50, PC1 = 25, PC2 = 15, PC3 = 10 — what percentage of information is lost if you drop PC3?",
    opts: [
      "10%",
      "15%",
      "20%",
      "80%"
    ],
    correct: 2,
    explain: "Dropping PC3 removes 10 out of 50 total variance, resulting in 20% information loss.",
    cat: "Calculation"
  }
];

// ═══════════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════════
let current = 0;
let answers = [];   // index of chosen option or null
const LETTERS = ['A','B','C','D'];

// ═══════════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════════
function startQuiz() {
  current = 0;
  answers = new Array(QUESTIONS.length).fill(null);
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display   = 'block';
  renderQuestion();
}

// ═══════════════════════════════════════════════════════════════════
//  RENDER QUESTION
// ═══════════════════════════════════════════════════════════════════
function renderQuestion() {
  const q   = QUESTIONS[current];
  const pct = (current / QUESTIONS.length) * 100;

  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('q-cur').textContent    = current + 1;
  document.getElementById('q-badge').textContent  = 'Q' + String(current+1).padStart(2,'0');
  document.getElementById('q-cat').textContent    = q.cat;
  document.getElementById('q-text').textContent   = q.q;
  document.getElementById('next-btn').style.display = 'none';

  const opts = document.getElementById('options');
  opts.innerHTML = '';

  q.opts.forEach((text, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = `<span class="opt-letter">${LETTERS[i]}</span><span>${text}</span>`;
    btn.style.animationDelay = (i * 0.06) + 's';
    btn.style.animation = 'slideIn .3s ease both';
    btn.onclick = () => pick(i);
    opts.appendChild(btn);
  });
}

// ═══════════════════════════════════════════════════════════════════
//  PICK ANSWER
// ═══════════════════════════════════════════════════════════════════
function pick(idx) {
  const q    = QUESTIONS[current];
  answers[current] = idx;
  const btns = document.querySelectorAll('.opt');

  btns.forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.correct) {
      btn.classList.add('correct');
    } else if (i === idx && idx !== q.correct) {
      btn.classList.add('wrong');
    } else {
      btn.classList.add('dimmed');
    }
  });

  const nextBtn = document.getElementById('next-btn');
  nextBtn.style.display = 'inline-block';
  nextBtn.textContent   = current === QUESTIONS.length - 1
    ? 'See Results →'
    : 'Next Question →';
}

// ═══════════════════════════════════════════════════════════════════
//  NEXT
// ═══════════════════════════════════════════════════════════════════
function nextQuestion() {
  current++;
  if (current >= QUESTIONS.length) {
    showResults();
  } else {
    // re-animate card
    const qs = document.getElementById('quiz-screen');
    qs.style.animation = 'none';
    void qs.offsetWidth;
    qs.style.animation = 'fadeUp .35s ease both';
    renderQuestion();
  }
}

// ═══════════════════════════════════════════════════════════════════
//  RESULTS
// ═══════════════════════════════════════════════════════════════════
function showResults() {
  document.getElementById('quiz-screen').style.display   = 'none';
  document.getElementById('result-screen').style.display = 'block';
  document.getElementById('prog-bar').style.width        = '100%';
  document.getElementById('q-cur').textContent           = 20;

  const score = answers.reduce((acc, a, i) => acc + (a === QUESTIONS[i].correct ? 1 : 0), 0);

  // animate score number
  const sNum = document.getElementById('s-num');
  let counted = 0;
  const timer = setInterval(() => {
    counted++;
    sNum.textContent = counted;
    if (counted >= score) clearInterval(timer);
  }, 60);

  // animate arc
  const circ  = 2 * Math.PI * 62;   // 389.6
  const arc   = document.getElementById('score-arc');
  setTimeout(() => {
    arc.style.strokeDashoffset = circ - (score / 20) * circ;
  }, 150);

  // label
  const labels = ['Keep Studying 📖','Passing 🎯','Good Work 👍','Great Score 🌟','Perfect! 🏆'];
  const tier = score <= 9 ? 0 : score <= 13 ? 1 : score <= 16 ? 2 : score <= 18 ? 3 : 4;
  document.getElementById('s-label').textContent = labels[tier];
  document.getElementById('s-sub').textContent   = `You answered ${score} out of 20 questions correctly.`;

  // highlight grade pill
  document.querySelectorAll('.grade-pill').forEach(p => {
    if (score >= +p.dataset.min && score <= +p.dataset.max) p.classList.add('active');
    else p.classList.remove('active');
  });

  // build review
  const list = document.getElementById('review-list');
  list.innerHTML = '';

  QUESTIONS.forEach((q, i) => {
    const chosen  = answers[i];
    const correct = chosen === q.correct;

    const item = document.createElement('div');
    item.className = `review-item ${correct ? 'ri-correct' : 'ri-wrong'}`;

    const choicesHTML = q.opts.map((opt, oi) => {
      let cls = 'rc-neutral';
      if (oi === q.correct)                cls = 'rc-correct';
      else if (oi === chosen && !correct)  cls = 'rc-wrong-pick';
      return `<div class="ri-choice ${cls}">
        <span class="ri-choice-ltr">${LETTERS[oi]}</span>
        <span>${opt}</span>
      </div>`;
    }).join('');

    item.innerHTML = `
      <div class="ri-top" onclick="toggleReview(this)">
        <div class="ri-icon">${correct ? '✓' : '✕'}</div>
        <div class="ri-qtext">
          <span style="font-family:var(--mono);font-size:10px;color:var(--muted);margin-right:8px;">Q${String(i+1).padStart(2,'0')}</span>
          ${q.q}
        </div>
        <span class="ri-chevron">▼</span>
      </div>
      <div class="ri-body">
        <div class="ri-choices">${choicesHTML}</div>
        <div class="ri-explain">
          <div class="ri-explain-label">Explanation</div>
          ${q.explain}
        </div>
      </div>`;

    list.appendChild(item);
  });
}

function toggleReview(el) {
  el.parentElement.classList.toggle('open');
}

// ── kick off ──
startQuiz();
</script>
</body>
</html>
